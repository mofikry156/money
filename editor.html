<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation — Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --gold-dark: #8a6c3a;
    --cream: #fdf8f0;
    --deep: #1a1208;
    --parchment: #f5edd8;
    --rose: #b5808a;
  }

  body {
    background: var(--deep);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(201,169,110,0.13) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(181,128,138,0.10) 0%, transparent 60%);
    pointer-events: none;
  }

  .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .particle {
    position: absolute;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0%   { opacity: 0; transform: translateY(100vh) scale(0) rotate(0deg); }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-40px) scale(1) rotate(360deg); }
  }

  .header {
    position: relative; z-index: 1;
    text-align: center;
    margin-bottom: 52px;
    animation: headerIn 1s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes headerIn {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .site-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.45em;
    color: var(--gold);
    opacity: 0.55;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  h1.site-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    color: var(--gold-light);
    font-size: clamp(2rem, 6vw, 3.2rem);
    letter-spacing: 0.08em;
    line-height: 1.1;
    margin-bottom: 10px;
    text-shadow: 0 0 60px rgba(201,169,110,0.3);
  }

  .site-sub {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.4;
  }

  .ornament {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 0 auto 52px;
    max-width: 240px;
    position: relative; z-index: 1;
    opacity: 0;
    animation: fadeSlide 0.8s 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: scaleX(0.6); }
    to   { opacity: 1; transform: scaleX(1); }
  }
  .ornament-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-dark)); opacity: 0.5; }
  .ornament-line.r { background: linear-gradient(to left, transparent, var(--gold-dark)); }
  .ornament-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); opacity: 0.7; }

  .editor {
    background: rgba(255,255,255,0.028);
    border: 1px solid rgba(201,169,110,0.16);
    border-top: 1px solid rgba(201,169,110,0.28);
    border-radius: 3px;
    padding: 44px 48px;
    width: 100%;
    max-width: 560px;
    position: relative; z-index: 1;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    opacity: 0;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,169,110,0.12);
    animation: cardIn 0.9s 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .editor::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 3px;
    background: linear-gradient(135deg, rgba(201,169,110,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .editor-title {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 0.68rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 36px;
    text-align: center;
    opacity: 0.8;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }

  label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.65;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  label .dot {
    width: 3px; height: 3px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0.5;
  }

  input[type="text"], input[type="date"], textarea {
    background: rgba(201,169,110,0.04);
    border: 1px solid rgba(201,169,110,0.12);
    border-bottom: 1px solid rgba(201,169,110,0.32);
    border-radius: 2px 2px 0 0;
    padding: 13px 15px 11px;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.08rem;
    outline: none;
    transition: border-color 0.35s, background 0.35s, box-shadow 0.35s;
    width: 100%;
  }
  input:focus, textarea:focus {
    border-color: rgba(201,169,110,0.22);
    border-bottom-color: var(--gold);
    background: rgba(201,169,110,0.07);
    box-shadow: 0 6px 24px rgba(201,169,110,0.05);
  }
  input::placeholder, textarea::placeholder { color: rgba(253,248,240,0.25); font-style: italic; font-size: 0.95rem; }

  .field::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    width: 0; height: 1.5px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
    transition: width 0.4s cubic-bezier(0.22,1,0.36,1), left 0.4s cubic-bezier(0.22,1,0.36,1);
    pointer-events: none;
    z-index: 2;
  }
  .field:focus-within::after { width: 100%; left: 0; }

  textarea { resize: vertical; min-height: 88px; line-height: 1.75; }

  .full-row { margin-bottom: 20px; }

  /* Theme selector */
  .theme-section { margin-bottom: 32px; }
  .theme-label { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); opacity: 0.65; margin-bottom: 14px; }
  .theme-row { display: flex; gap: 14px; align-items: center; }
  .theme-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 2.5px solid transparent;
    cursor: pointer; transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
    position: relative;
  }
  .theme-btn::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .theme-btn:hover { transform: scale(1.18); }
  .theme-btn.active { border-color: rgba(255,255,255,0.7); transform: scale(1.18); box-shadow: 0 0 14px rgba(201,169,110,0.4); }
  .theme-btn.active::after { border-color: rgba(201,169,110,0.3); }
  .theme-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--gold-light);
    font-size: 0.9rem;
    opacity: 0.6;
    margin-left: auto;
    transition: opacity 0.2s;
  }

  /* ── SPECIAL SECTION ── */
  .special-divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 36px 0 28px;
  }
  .special-divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(181,128,138,0.5)); }
  .special-divider-line.r { background: linear-gradient(to left, transparent, rgba(181,128,138,0.5)); }
  .special-divider-label {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #d4a0a8;
    opacity: 0.8;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Add note button */
  .add-note-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(181,128,138,0.15);
    border: 1px solid rgba(181,128,138,0.4);
    color: #e8c0c8;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.2s;
    flex-shrink: 0;
  }
  .add-note-btn:hover { background: rgba(181,128,138,0.3); transform: scale(1.12); }

  /* Note entries container */
  #noteEntries { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }

  .note-entry {
    background: rgba(181,128,138,0.06);
    border: 1px solid rgba(181,128,138,0.18);
    border-top: 1px solid rgba(181,128,138,0.32);
    border-radius: 3px;
    padding: 22px 22px 18px;
    position: relative;
    animation: noteIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes noteIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .note-entry::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 3px;
    background: linear-gradient(135deg, rgba(181,128,138,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .note-entry-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .note-entry-icon { font-size: 1rem; opacity: 0.65; }
  .note-entry-title {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #d4a0a8;
    opacity: 0.9;
    flex: 1;
  }
  .note-entry-num {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: #d4a0a8;
    opacity: 0.45;
  }
  .remove-entry-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(181,128,138,0.1);
    border: 1px solid rgba(181,128,138,0.25);
    color: #e8c0c8;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, opacity 0.2s;
    opacity: 0.5;
    line-height: 1;
  }
  .remove-entry-btn:hover { background: rgba(181,128,138,0.3); opacity: 1; }

  .note-field {
    margin-bottom: 14px;
  }
  .note-field label {
    color: #d4a0a8;
    margin-bottom: 6px;
    display: flex;
  }
  .note-field textarea {
    border-bottom-color: rgba(181,128,138,0.4);
    min-height: 72px;
    font-size: 1rem;
  }
  .note-field textarea:focus { border-bottom-color: #d4a0a8; }
  .note-field .field::after {
    background: linear-gradient(90deg, #8a5060, #d4a0a8, #e8c0c8);
  }

  /* Photo upload */
  .photo-upload-label {
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #d4a0a8;
    opacity: 0.65;
    margin-bottom: 10px;
    display: block;
  }
  .photo-slots {
    display: flex;
    gap: 10px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .photo-slot {
    width: 80px; height: 80px;
    border: 1.5px dashed rgba(181,128,138,0.3);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, background 0.25s;
    background: rgba(181,128,138,0.04);
  }
  .photo-slot:hover { border-color: rgba(181,128,138,0.6); background: rgba(181,128,138,0.08); }
  .photo-slot.has-image { border-color: rgba(181,128,138,0.5); border-style: solid; }
  .photo-slot-icon { font-size: 1.2rem; opacity: 0.3; margin-bottom: 3px; }
  .photo-slot-text { font-size: 0.44rem; letter-spacing: 0.18em; text-transform: uppercase; color: #d4a0a8; opacity: 0.5; }
  .photo-slot img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 3px;
  }
  .photo-slot .remove-btn {
    position: absolute; top: 3px; right: 3px;
    width: 16px; height: 16px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 2;
    border: none;
    line-height: 1;
  }
  .photo-slot.has-image:hover .remove-btn { opacity: 1; }
  input[type="file"] { display: none; }

  .photo-hint {
    font-size: 0.48rem;
    letter-spacing: 0.16em;
    color: #d4a0a8;
    opacity: 0.32;
    font-family: 'Lato', sans-serif;
  }

  /* Code display */
  .code-preview {
    display: none;
    margin-top: 14px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(181,128,138,0.25);
    border-radius: 3px;
    padding: 12px 16px;
    align-items: center;
    gap: 12px;
  }
  .code-preview.visible { display: flex; }
  .code-label-small {
    font-size: 0.48rem;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: #d4a0a8;
    opacity: 0.7;
    white-space: nowrap;
  }
  .code-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    color: #e8c0c8;
    letter-spacing: 0.25em;
    flex: 1;
    text-align: center;
  }
  .copy-code-btn {
    background: rgba(181,128,138,0.15);
    border: 1px solid rgba(181,128,138,0.3);
    color: #d4a0a8;
    padding: 5px 12px;
    border-radius: 2px;
    font-size: 0.48rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .copy-code-btn:hover { background: rgba(181,128,138,0.28); }

  /* Buttons */
  .generate-btn {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), #e8c87a, var(--gold));
    background-size: 300% 300%;
    border: none;
    border-radius: 2px;
    color: var(--deep);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.28s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s;
    animation: gradientShift 4s ease infinite;
    box-shadow: 0 4px 28px rgba(201,169,110,0.22);
    margin-bottom: 14px;
  }
  .generate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.13);
    opacity: 0;
    transition: opacity 0.3s;
  }
  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .generate-btn:hover::before { opacity: 1; }
  .generate-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 44px rgba(201,169,110,0.38); }
  .generate-btn:active { transform: translateY(0); box-shadow: 0 4px 16px rgba(201,169,110,0.18); }

  .generate-special-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #8a5060, #b5717f, #d4a0a8, #b5717f);
    background-size: 300% 300%;
    border: none;
    border-radius: 2px;
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.28s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s;
    animation: gradientShiftRose 5s ease infinite;
    box-shadow: 0 4px 28px rgba(181,113,127,0.22);
  }
  @keyframes gradientShiftRose {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .generate-special-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(181,113,127,0.38); }
  .generate-special-btn:active { transform: translateY(0); }

  .footer-note {
    margin-top: 28px;
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    opacity: 0.3;
    position: relative; z-index: 1;
  }

  @media (max-width: 520px) {
    .editor { padding: 32px 24px; }
    .field-row { grid-template-columns: 1fr; }
    .photo-slots { justify-content: center; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header class="header">
  <div class="site-eyebrow">Bespoke · Elegant · Timeless</div>
  <h1 class="site-title">Wedding<br>Invitations</h1>
  <p class="site-sub">Craft your perfect invitation</p>
</header>

<div class="ornament">
  <div class="ornament-line"></div>
  <div class="ornament-diamond"></div>
  <div class="ornament-line r"></div>
</div>

<div class="editor">
  <div class="editor-title">✦ Invitation Details ✦</div>

  <div class="field-row">
    <div class="field">
      <label><span class="dot"></span>His Name</label>
      <input type="text" id="nameMan" placeholder="e.g. James" />
    </div>
    <div class="field">
      <label><span class="dot"></span>Her Name</label>
      <input type="text" id="nameWoman" placeholder="e.g. Sofia" />
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label><span class="dot"></span>Date</label>
      <input type="date" id="weddingDate" />
    </div>
    <div class="field">
      <label><span class="dot"></span>Time</label>
      <input type="text" id="weddingTime" placeholder="e.g. 5:00 PM" />
    </div>
  </div>

  <div class="full-row field">
    <label><span class="dot"></span>Venue / Location</label>
    <input type="text" id="venue" placeholder="e.g. The Grand Ballroom, Cairo" />
    <div style="font-size:0.55rem;letter-spacing:0.2em;color:var(--gold);opacity:0.35;margin-top:6px;font-family:'Lato',sans-serif;">Paste a Google Maps link and it will become clickable in the invitation</div>
  </div>

  <div class="full-row field">
    <label><span class="dot"></span>Personal Message <span style="opacity:0.4;font-style:italic;letter-spacing:0.1em;text-transform:none;font-size:0.85em">(optional)</span></label>
    <textarea id="message" placeholder="e.g. Together with their families, they joyfully invite you..."></textarea>
  </div>

  <div class="theme-section">
    <div class="theme-label">Color Theme</div>
    <div class="theme-row">
      <div class="theme-btn active" data-theme="gold"  data-name="Gold"  style="background: linear-gradient(135deg,#c9a96e,#8a6c3a)" title="Gold"></div>
      <div class="theme-btn"        data-theme="rose"  data-name="Rose"  style="background: linear-gradient(135deg,#d4a0a8,#8a5060)" title="Rose"></div>
      <div class="theme-btn"        data-theme="sage"  data-name="Sage"  style="background: linear-gradient(135deg,#8aaa88,#4a6a48)" title="Sage"></div>
      <div class="theme-btn"        data-theme="navy"  data-name="Navy"  style="background: linear-gradient(135deg,#6070a0,#2a3460)" title="Navy"></div>
      <div class="theme-btn"        data-theme="blush" data-name="Blush" style="background: linear-gradient(135deg,#e8c4b8,#b07060)" title="Blush"></div>
      <span class="theme-name" id="themeName">Gold</span>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn">✦ &nbsp; Reveal the Invitation &nbsp; ✦</button>

  <!-- ══ SPECIAL SECTION ══ -->
  <div class="special-divider">
    <div class="special-divider-line"></div>
    <div class="special-divider-label">
      ✿ Special Notes
      <button class="add-note-btn" id="addNoteBtn" title="Add another special note">+</button>
    </div>
    <div class="special-divider-line r"></div>
  </div>

  <!-- Note entries dynamically rendered here -->
  <div id="noteEntries"></div>

  <button class="generate-special-btn" id="generateSpecialBtn">✿ &nbsp; Generate Special Invitations &nbsp; ✿</button>

</div>

<p class="footer-note">Opens your invitation in a new window · Codes stored inside the invitation file</p>

<script>
  // Particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 3;
    p.style.cssText = `left:${Math.random()*100}vw;width:${size}px;height:${size}px;animation-duration:${10+Math.random()*16}s;animation-delay:${Math.random()*14}s;`;
    pc.appendChild(p);
  }

  // Theme selector
  let currentTheme = 'gold';
  const themeNameEl = document.getElementById('themeName');
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTheme = btn.dataset.theme;
      themeNameEl.textContent = btn.dataset.name;
    });
  });

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  // ── NOTE ENTRIES ──
  let noteCount = 0;
  // Each entry: { id, photos: [null,null,null] }
  const entries = [];

  function generateCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 6; i++) {
      if (i === 3) code += '-';
      code += chars[Math.floor(Math.random() * chars.length)];
    }
    return code;
  }

  function addNoteEntry() {
    const id = ++noteCount;
    const entryData = { id, photos: [null, null, null] };
    entries.push(entryData);

    const container = document.getElementById('noteEntries');
    const div = document.createElement('div');
    div.className = 'note-entry';
    div.id = 'entry-' + id;
    div.innerHTML = `
      <div class="note-entry-header">
        <span class="note-entry-icon">🔐</span>
        <span class="note-entry-title">Secret Message</span>
        <span class="note-entry-num">#${id}</span>
        ${entries.length > 1 ? `<button class="remove-entry-btn" onclick="removeEntry(${id})" title="Remove this note">✕</button>` : ''}
      </div>

      <div class="note-field">
        <div class="field">
          <label><span class="dot" style="background:#d4a0a8"></span>Personal note to the guest</label>
          <textarea id="specialMsg-${id}" placeholder="e.g. You mean the world to us. Save us the first dance! 💕"></textarea>
        </div>
      </div>

      <div style="margin-bottom:12px;">
        <div class="photo-upload-label">✦ &nbsp; Upload Photos &nbsp; <span style="opacity:0.5;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:0.85em;text-transform:none;letter-spacing:0.1em">(up to 3)</span></div>
        <div class="photo-slots" id="photoSlots-${id}">
          <div class="photo-slot" id="slot-${id}-0" onclick="triggerUpload(${id},0)">
            <div class="photo-slot-icon">🌸</div>
            <div class="photo-slot-text">Add photo</div>
            <button class="remove-btn" onclick="removePhoto(event,${id},0)">✕</button>
          </div>
          <div class="photo-slot" id="slot-${id}-1" onclick="triggerUpload(${id},1)">
            <div class="photo-slot-icon">🌸</div>
            <div class="photo-slot-text">Add photo</div>
            <button class="remove-btn" onclick="removePhoto(event,${id},1)">✕</button>
          </div>
          <div class="photo-slot" id="slot-${id}-2" onclick="triggerUpload(${id},2)">
            <div class="photo-slot-icon">🌸</div>
            <div class="photo-slot-text">Add photo</div>
            <button class="remove-btn" onclick="removePhoto(event,${id},2)">✕</button>
          </div>
        </div>
        <input type="file" id="fileInput-${id}-0" accept="image/*" onchange="handleFile(event,${id},0)">
        <input type="file" id="fileInput-${id}-1" accept="image/*" onchange="handleFile(event,${id},1)">
        <input type="file" id="fileInput-${id}-2" accept="image/*" onchange="handleFile(event,${id},2)">
        <div class="photo-hint">Photos are compressed and embedded — no upload to any server</div>
      </div>

      <div class="code-preview" id="codePreview-${id}">
        <div class="code-label-small">Secret Code</div>
        <div class="code-value" id="codeDisplay-${id}">—</div>
        <button class="copy-code-btn" onclick="copyCode(${id})">Copy</button>
      </div>
    `;
    container.appendChild(div);
  }

  function removeEntry(id) {
    const idx = entries.findIndex(e => e.id === id);
    if (idx !== -1) entries.splice(idx, 1);
    const el = document.getElementById('entry-' + id);
    if (el) el.remove();
    // Re-number visually (update #N labels)
    document.querySelectorAll('.note-entry-num').forEach((el, i) => {
      el.textContent = '#' + (i + 1);
    });
    // Show/hide remove buttons
    updateRemoveBtns();
  }

  function updateRemoveBtns() {
    const allEntries = document.querySelectorAll('.note-entry');
    allEntries.forEach(entry => {
      const btn = entry.querySelector('.remove-entry-btn');
      if (allEntries.length > 1) {
        if (!btn) {
          // Add it
          const header = entry.querySelector('.note-entry-header');
          const numEl = header.querySelector('.note-entry-num');
          const id = parseInt(entry.id.replace('entry-',''));
          const newBtn = document.createElement('button');
          newBtn.className = 'remove-entry-btn';
          newBtn.title = 'Remove this note';
          newBtn.textContent = '✕';
          newBtn.onclick = () => removeEntry(id);
          header.insertBefore(newBtn, numEl.nextSibling);
        }
      } else {
        if (btn) btn.remove();
      }
    });
  }

  function triggerUpload(entryId, slotIdx) {
    document.getElementById(`fileInput-${entryId}-${slotIdx}`).click();
  }

  function handleFile(event, entryId, slotIdx) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const MAX = 600;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else        { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.6);
        const entry = entries.find(e => e.id === entryId);
        if (entry) entry.photos[slotIdx] = compressed;
        renderSlot(entryId, slotIdx, compressed);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  function renderSlot(entryId, slotIdx, src) {
    const slot = document.getElementById(`slot-${entryId}-${slotIdx}`);
    slot.classList.add('has-image');
    const existing = slot.querySelector('img');
    if (existing) existing.remove();
    slot.querySelector('.photo-slot-icon').style.display = 'none';
    slot.querySelector('.photo-slot-text').style.display = 'none';
    const img = document.createElement('img');
    img.src = src;
    slot.insertBefore(img, slot.firstChild);
  }

  function removePhoto(event, entryId, slotIdx) {
    event.stopPropagation();
    const entry = entries.find(e => e.id === entryId);
    if (entry) entry.photos[slotIdx] = null;
    const slot = document.getElementById(`slot-${entryId}-${slotIdx}`);
    slot.classList.remove('has-image');
    const img = slot.querySelector('img');
    if (img) img.remove();
    slot.querySelector('.photo-slot-icon').style.display = '';
    slot.querySelector('.photo-slot-text').style.display = '';
  }

  // Copy code for a specific entry
  const entryCodes = {};
  function copyCode(entryId) {
    const code = entryCodes[entryId] || '';
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.querySelector(`#codePreview-${entryId} .copy-code-btn`);
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1800);
    });
  }

  function getBaseParams() {
    return {
      man:   document.getElementById('nameMan').value.trim()    || 'James',
      woman: document.getElementById('nameWoman').value.trim()  || 'Sofia',
      date:  formatDate(document.getElementById('weddingDate').value),
      time:  document.getElementById('weddingTime').value.trim() || '',
      venue: document.getElementById('venue').value.trim()       || '',
      msg:   document.getElementById('message').value.trim()     || '',
      theme: currentTheme,
    };
  }

  // Regular invitation
  document.getElementById('generateBtn').addEventListener('click', () => {
    const b = getBaseParams();
    const params = new URLSearchParams(b);
    window.open('invitation.html?' + params.toString(), '_blank');
  });

  // Special invitations
  document.getElementById('generateSpecialBtn').addEventListener('click', () => {
    // Build array of special note data
    const allNotes = [];
    for (const entry of entries) {
      const msg = (document.getElementById(`specialMsg-${entry.id}`)?.value || '').trim();
      const photos = entry.photos.filter(p => p !== null);
      if (!msg && photos.length === 0) continue;
      const code = generateCode();
      entryCodes[entry.id] = code;
      document.getElementById(`codeDisplay-${entry.id}`).textContent = code;
      document.getElementById(`codePreview-${entry.id}`).classList.add('visible');
      allNotes.push({ msg, photos, code });
    }

    if (allNotes.length === 0) {
      // Flash all special cards
      document.querySelectorAll('.note-entry').forEach(el => {
        el.style.borderColor = 'rgba(181,128,138,0.6)';
        setTimeout(() => el.style.borderColor = '', 600);
      });
      return;
    }

    const b = getBaseParams();
    const params = new URLSearchParams(b);
    // Encode all notes as a JSON array
    params.set('special', btoa(unescape(encodeURIComponent(JSON.stringify(allNotes)))));

    window.open('invitation.html?' + params.toString(), '_blank');
  });

  document.getElementById('addNoteBtn').addEventListener('click', () => {
    addNoteEntry();
    updateRemoveBtns();
  });

  // Enter shortcuts
  ['nameMan','nameWoman','weddingTime','venue'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('generateBtn').click();
    });
  });

  // Start with one entry
  addNoteEntry();
</script>
</body>
</html>
